<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grocery Discovery — Prototype · Anel Bazarbayeva</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<style>
  :root{
    --green:#108910;--green-deep:#0c6e0c;--green-tint:#E7F4E7;
    --dark:#242529;--bg:#F6F7F8;--muted:#6E7178;--line:#E6E8EB;
    --amber-bg:#FEF3C7;--amber-tx:#92520B;--amber-line:#F6D77E;
    --r-card:8px;--r-pill:24px;--highlight:#FCEB6B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'DM Sans',system-ui,sans-serif;background:#1e1f23;color:var(--dark);-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input{font-family:inherit;}
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:#cfd2d6;border-radius:8px;}
  .no-sb::-webkit-scrollbar{display:none;}
  .no-sb{-ms-overflow-style:none;scrollbar-width:none;}
  #root{min-height:100vh;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useRef, useEffect, useLayoutEffect } = React;

// ===== DATA =====
const STORES=[{id:'foodbazaar',name:'Food Bazaar',color:'#C8102E',initials:'FB',eta:'8:30am tomorrow',dist:'1.7 mi',deals:[{t:'$15 off on $125+',hi:true},{t:'No markups',hi:true}],ebt:true},{id:'walmart',name:'Walmart',color:'#0071CE',initials:'W',eta:'8:30am tomorrow',dist:'3.9 mi',deals:[{t:'No markups',hi:true}],ebt:false},{id:'superfresh',name:'Superfresh',color:'#E8821A',initials:'SF',eta:'12:00am',dist:'9.0 mi',deals:[{t:'Local',hi:false}],ebt:false},{id:'wegmans',name:'Wegmans',color:'#0A8A3C',initials:'WG',eta:'10:15am tomorrow',dist:'4.2 mi',deals:[{t:'No markups',hi:true}],ebt:true},{id:'quicklly',name:'Quicklly',color:'#7C3AED',initials:'Q',eta:'1:00pm today',dist:'2.1 mi',deals:[{t:'Specialty',hi:false}],ebt:false}];
const DIETARY=[{id:'halal',label:'Halal',count:128},{id:'glutenfree',label:'Gluten-Free',count:64},{id:'vegan',label:'Vegan',count:92},{id:'vegetarian',label:'Vegetarian',count:211},{id:'organic',label:'Organic',count:156},{id:'kosher',label:'Kosher',count:47}];
const TAG_STYLE={Halal:{bg:'#E7F4E7',tx:'#0c6e0c'},'Gluten-Free':{bg:'#FDEEF1',tx:'#B0234A'},GF:{bg:'#FDEEF1',tx:'#B0234A'},Vegan:{bg:'#EAF1FE',tx:'#1E5BC6'},Vegetarian:{bg:'#EAF1FE',tx:'#1E5BC6'},Organic:{bg:'#F1EEFB',tx:'#6B43C9'},Kosher:{bg:'#FFF4E6',tx:'#B5670B'}};
const SEARCH_PRODUCTS=[{id:'p1',emoji:'🥖',name:'Halal Sourdough Boule',size:'20 oz',store:'Food Bazaar',storeColor:'#C8102E',price:3.49,was:null,tags:['Halal'],aiPick:true,aiReason:'Best protein & lowest price per oz for your search',stock:'Many in stock'},{id:'p2',emoji:'🍞',name:'Gluten-Free White Sandwich',size:'18 oz',store:'Wegmans',storeColor:'#0A8A3C',price:4.79,was:5.49,tags:['Halal','Gluten-Free'],aiPick:false,stock:'Many in stock'},{id:'p3',emoji:'🥯',name:'Sesame Bagels · 6 ct',size:'17 oz',store:'Walmart',storeColor:'#0071CE',price:2.99,was:null,tags:['Halal'],aiPick:false,stock:'In stock'},{id:'p4',emoji:'🫓',name:'Whole-Wheat Pita Pockets',size:'12 oz',store:'Quicklly',storeColor:'#7C3AED',price:2.49,was:3.29,tags:['Halal','Vegan'],aiPick:false,stock:'Likely out of stock'}];
const CART_ITEMS=[{id:'c1',emoji:'🥖',name:'Halal Sourdough Boule',size:'20 oz',store:'Food Bazaar',storeColor:'#C8102E',price:3.49,qty:1,tags:['Halal']},{id:'c2',emoji:'🥑',name:'Organic Avocados · 4 ct',size:'bag',store:'Wegmans',storeColor:'#0A8A3C',price:5.49,qty:1,tags:['Organic','Vegan']},{id:'c3',emoji:'🍗',name:'Halal Chicken Breast',size:'2 lb',store:'Food Bazaar',storeColor:'#C8102E',price:12.79,qty:1,tags:['Halal']},{id:'c4',emoji:'🥛',name:'Oat Milk · Barista',size:'½ gal',store:'Walmart',storeColor:'#0071CE',price:6.99,qty:1,tags:['Vegan']}];
const BUDGET={subtotal:28.76,delivery:3.99,tip:2.88,tax:2.55,total:38.18,freeDeliveryAt:35.00};
const CHAT_SUGGESTIONS=[{id:'s1',emoji:'🥗',name:'Chickpea Power Bowl',store:'Wegmans',storeColor:'#0A8A3C',price:7.49,protein:'24g',tags:['Vegetarian']},{id:'s2',emoji:'🌯',name:'Lentil & Quinoa Wrap',store:'Food Bazaar',storeColor:'#C8102E',price:6.29,protein:'19g',tags:['Vegetarian']},{id:'s3',emoji:'🧆',name:'Falafel Mezze Box',store:'Quicklly',storeColor:'#7C3AED',price:5.99,protein:'21g',tags:['Vegetarian','Vegan']}];
const STORE_RESULTS=[{id:'walmart',name:'Walmart',color:'#0071CE',initials:'W',eta:'8:30am tomorrow',dist:'3.9 mi',deals:[{t:'No markups',hi:true}],products:[{id:'w1',emoji:'🍞',name:'Great Value Pumpernickel Rye',size:'17 oz',price:4.24,tags:['Halal'],stock:'Many in stock',aiPick:true,aiReason:'Lowest price per oz that matches Halal + under $5'},{id:'w2',emoji:'🥖',name:'Ace Bakery Classic White ½ Loaf',size:'21 oz',price:4.48,tags:['Halal'],stock:'Many in stock'},{id:'w3',emoji:'🥪',name:'Wal-Mart Bakery Cuban Bread',size:'11 oz',price:null,tags:['Halal'],stock:'Out of stock'},{id:'w4',emoji:'🫓',name:'Pan Pita Original',size:'1 each',price:3.12,tags:['Halal','Vegan'],stock:'Out of stock'},{id:'w5',emoji:'🥯',name:'Plain Bagels · 6 ct',size:'20 oz',price:2.98,tags:['Halal'],stock:'Many in stock'}]},{id:'foodbazaar',name:'Food Bazaar',color:'#C8102E',initials:'FB',eta:'8:30am tomorrow',dist:'1.7 mi',deals:[{t:'$15 off on $125+',hi:true},{t:'No markups',hi:true},{t:'EBT',hi:false}],products:[{id:'f1',emoji:'🥐',name:'Pane di Casa Bread',size:'1 each',price:6.49,was:7.49,tags:['Halal'],stock:'Likely out of stock',request:true},{id:'f2',emoji:'🥖',name:'Pan Sobao Sweet Bread',size:'12 oz',price:2.29,tags:['Halal'],stock:'Many in stock'},{id:'f3',emoji:'🍞',name:'Double Fibre Toasted Bread · 14 ct',size:'14 ct',price:2.99,was:3.29,tags:['Halal','Vegan'],stock:'Many in stock'},{id:'f4',emoji:'🥨',name:"Martin's Old-Fashioned Rolls",size:'18 oz',price:4.59,tags:['Halal'],stock:'Many in stock'},{id:'f5',emoji:'🫓',name:'Stone-Baked Halal Pita',size:'14 oz',price:3.19,tags:['Halal','Vegan'],stock:'Many in stock'}]},{id:'superfresh',name:'Superfresh Food World',color:'#E8821A',initials:'SF',eta:'12:00am',dist:'9.0 mi',deals:[{t:'Local',hi:false}],products:[{id:'s1',emoji:'🥖',name:'Halal Sourdough Boule',size:'20 oz',price:3.49,tags:['Halal'],stock:'Many in stock'},{id:'s2',emoji:'🍞',name:'Gluten-Free White Sandwich',size:'18 oz',price:4.79,was:5.49,tags:['Halal','Gluten-Free'],stock:'Many in stock'},{id:'s3',emoji:'🥯',name:'Whole-Wheat Bagels · 4 ct',size:'15 oz',price:3.29,tags:['Halal'],stock:'Many in stock'},{id:'s4',emoji:'🫓',name:'Naan Flatbread · 2 ct',size:'9 oz',price:2.99,tags:['Halal','Vegetarian'],stock:'Likely out of stock',request:true}]}];

// ===== ICONS =====
const Ico={search:(p)=>(<svg width={p.s||20} height={p.s||20} viewBox="0 0 24 24" fill="none" stroke={p.c||'currentColor'} strokeWidth="2.2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>),x:(p)=>(<svg width={p.s||18} height={p.s||18} viewBox="0 0 24 24" fill="none" stroke={p.c||'currentColor'} strokeWidth="2.2" strokeLinecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>),cart:(p)=>(<svg width={p.s||22} height={p.s||22} viewBox="0 0 24 24" fill="none" stroke={p.c||'currentColor'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2.5 3h2.2l2.1 11.2a1.5 1.5 0 0 0 1.5 1.2h8.4a1.5 1.5 0 0 0 1.5-1.2L21 6H6"/></svg>),plus:(p)=>(<svg width={p.s||20} height={p.s||20} viewBox="0 0 24 24" fill="none" stroke={p.c||'#fff'} strokeWidth="2.6" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>),minus:(p)=>(<svg width={p.s||20} height={p.s||20} viewBox="0 0 24 24" fill="none" stroke={p.c||'#fff'} strokeWidth="2.6" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>),check:(p)=>(<svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill="none" stroke={p.c||'#fff'} strokeWidth="3.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 12.5 9.5 18 20 6"/></svg>),chev:(p)=>(<svg width={p.s||18} height={p.s||18} viewBox="0 0 24 24" fill="none" stroke={p.c||'currentColor'} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{transform:`rotate(${p.r||0}deg)`}}><polyline points="9 6 15 12 9 18"/></svg>),bolt:(p)=>(<svg width={p.s||15} height={p.s||15} viewBox="0 0 24 24" fill={p.c||'#108910'}><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>),spark:(p)=>(<svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill={p.c||'#92520B'}><path d="M12 2l1.6 6.4L20 10l-6.4 1.6L12 18l-1.6-6.4L4 10l6.4-1.6z"/></svg>),back:(p)=>(<svg width={p.s||22} height={p.s||22} viewBox="0 0 24 24" fill="none" stroke={p.c||'currentColor'} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="20" y1="12" x2="4" y2="12"/><polyline points="11 5 4 12 11 19"/></svg>),pin:(p)=>(<svg width={p.s||16} height={p.s||16} viewBox="0 0 24 24" fill="none" stroke={p.c||'currentColor'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 21s-6-5.2-6-10a6 6 0 0 1 12 0c0 4.8-6 10-6 10z"/><circle cx="12" cy="11" r="2"/></svg>),send:(p)=>(<svg width={p.s||20} height={p.s||20} viewBox="0 0 24 24" fill="none" stroke={p.c||'#fff'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>),stock:(p)=>(<svg width={p.s||16} height={p.s||16} viewBox="0 0 24 24" fill="none" stroke={p.c||'currentColor'} strokeWidth="2" strokeLinecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="14" y2="17"/></svg>)};

// ===== SHARED COMPONENTS =====
function Logo({size=34}){return(<div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:size,height:size,borderRadius:10,background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 6px rgba(16,137,16,.28)'}}><svg width={size*.6} height={size*.6} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8h18l-1.6 11.2a2 2 0 0 1-2 1.8H6.6a2 2 0 0 1-2-1.8z"/><path d="M8 8a4 4 0 0 1 8 0"/></svg></div><div style={{lineHeight:1}}><div style={{fontWeight:700,fontSize:17,letterSpacing:'-.02em',color:'var(--dark)'}}>Grocery<span style={{color:'var(--green)'}}>Discovery</span></div></div></div>);}
function Tag({label,small}){const s=TAG_STYLE[label]||{bg:'#EEF0F2',tx:'#5a5d63'};return(<span style={{display:'inline-flex',alignItems:'center',gap:4,background:s.bg,color:s.tx,fontWeight:600,fontSize:small?10.5:11.5,padding:small?'2px 7px':'3px 9px',borderRadius:24,whiteSpace:'nowrap'}}>{label}</span>);}
function DealChip({children,muted}){if(muted)return<span style={{background:'#EEF0F2',color:'#5a5d63',fontWeight:600,fontSize:12,padding:'3px 8px',borderRadius:5}}>{children}</span>;return<span style={{background:'var(--highlight)',color:'#3a3300',fontWeight:700,fontSize:12,padding:'3px 8px',borderRadius:5}}>{children}</span>;}
function FilterPill({label,active,onToggle}){return(<button onClick={onToggle} style={{display:'inline-flex',alignItems:'center',gap:7,height:36,padding:active?'0 16px 0 12px':'0 16px',borderRadius:'var(--r-pill)',background:active?'var(--green-tint)':'#fff',border:active?'1.5px solid var(--green)':'1.5px solid var(--line)',color:active?'var(--green-deep)':'var(--dark)',fontWeight:600,fontSize:13.5,transition:'all .15s'}}>{active&&(<span style={{width:16,height:16,borderRadius:'50%',background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico.check s={11}/></span>)}{label}</button>);}
function StoreMark({store,size=28}){return(<div style={{width:size,height:size,borderRadius:8,flex:'0 0 auto',background:store.color,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:size*.4,letterSpacing:'-.02em'}}>{store.initials}</div>);}
function StoreRail({activeId,onPick}){return(<div className="no-sb" style={{display:'flex',gap:10,overflowX:'auto',padding:'2px 0'}}>{STORES.map(st=>{const on=activeId===st.id;return(<button key={st.id} onClick={()=>onPick&&onPick(st.id)} style={{flex:'0 0 auto',display:'flex',alignItems:'center',gap:9,height:52,padding:'0 16px 0 10px',borderRadius:12,background:'#fff',border:on?'2px solid var(--green)':'1.5px solid var(--line)',transition:'border .15s'}}><StoreMark store={st} size={32}/><span style={{fontWeight:600,fontSize:13.5,color:'var(--dark)',whiteSpace:'nowrap'}}>{st.name}</span></button>);})}</div>);}
function AddBtn({qty,onAdd,onSub,size=36}){if(!qty)return(<button onClick={onAdd} style={{width:size,height:size,borderRadius:'50%',background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 8px rgba(16,137,16,.32)'}}><Ico.plus s={size*.55}/></button>);return(<div style={{display:'flex',alignItems:'center',height:size,borderRadius:size,background:'var(--green)',boxShadow:'0 2px 8px rgba(16,137,16,.32)',padding:'0 3px',gap:2}}><button onClick={onSub} style={{width:size-6,height:size-6,display:'flex',alignItems:'center',justifyContent:'center'}}><Ico.minus s={size*.5}/></button><span style={{color:'#fff',fontWeight:700,fontSize:14,minWidth:16,textAlign:'center'}}>{qty}</span><button onClick={onAdd} style={{width:size-6,height:size-6,display:'flex',alignItems:'center',justifyContent:'center'}}><Ico.plus s={size*.5}/></button></div>);}
function StockLabel({text}){const out=/out of stock/i.test(text);return(<div style={{display:'flex',alignItems:'center',gap:6,color:out?'#B0234A':'#5a8a3c',fontSize:12,fontWeight:600}}><Ico.stock s={14} c={out?'#B0234A':'#5a8a3c'}/>{text}</div>);}
const money=(n)=>'$'+n.toFixed(2);
function PriceSplit({value,size=20}){const[d,c]=value.toFixed(2).split('.');return(<span style={{fontWeight:700,color:'var(--dark)',lineHeight:1}}><span style={{fontSize:size*.62,verticalAlign:'top'}}>$</span><span style={{fontSize:size}}>{d}</span><span style={{fontSize:size*.62,verticalAlign:'top'}}>{c}</span></span>);}
function ProductCard({p,qty,onAdd,onSub}){const[hover,setHover]=useState(false);return(<div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} style={{position:'relative',background:'#fff',borderRadius:'var(--r-card)',border:'1px solid var(--line)',padding:14,boxShadow:hover?'0 8px 22px rgba(20,30,40,.10)':'0 1px 2px rgba(20,30,40,.04)',transition:'box-shadow .18s, transform .18s',transform:hover?'translateY(-2px)':'none',display:'flex',flexDirection:'column'}}><div style={{position:'relative',height:140,borderRadius:8,background:'linear-gradient(160deg,#FAFBF8,#F0F2EE)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12}}>{p.aiPick&&(<div style={{position:'absolute',top:10,left:10,display:'inline-flex',alignItems:'center',gap:5,background:'var(--amber-bg)',color:'var(--amber-tx)',border:'1px solid var(--amber-line)',fontWeight:700,fontSize:11.5,padding:'4px 9px',borderRadius:24}}><Ico.spark s={12}/>AI pick</div>)}<div style={{position:'absolute',top:8,right:8}}><AddBtn qty={qty} onAdd={onAdd} onSub={onSub} size={38}/></div><span style={{fontSize:64,filter:'drop-shadow(0 6px 10px rgba(0,0,0,.12))'}}>{p.emoji}</span></div><div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:4}}><PriceSplit value={p.price} size={22}/>{p.was&&<span style={{color:'#9a9da3',fontSize:13,textDecoration:'line-through'}}>{money(p.was)}</span>}{p.was&&<span style={{color:'var(--green)',fontSize:12.5,fontWeight:700}}>{Math.round((1-p.price/p.was)*100)}% off</span>}</div><div style={{fontWeight:600,fontSize:14.5,color:'var(--dark)',lineHeight:1.25,marginBottom:2}}>{p.name}</div><div style={{color:'var(--muted)',fontSize:12.5,marginBottom:10}}>{p.size}</div><div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>{p.tags.map(t=><Tag key={t} label={t}/>)}</div><div style={{marginTop:'auto',paddingTop:10,borderTop:'1px solid var(--line)',display:'flex',alignItems:'center',justifyContent:'space-between'}}><div style={{display:'flex',alignItems:'center',gap:7}}><StoreMark store={{color:p.storeColor,initials:p.store[0]}} size={20}/><span style={{fontSize:12.5,fontWeight:600,color:'#4a4d53'}}>{p.store}</span></div></div>{p.aiPick&&(<div style={{marginTop:10,background:'#FFFBEF',border:'1px solid var(--amber-line)',borderRadius:8,padding:'8px 10px',display:'flex',gap:7}}><Ico.spark s={13}/><span style={{fontSize:11.5,color:'var(--amber-tx)',lineHeight:1.35,fontWeight:500}}>{p.aiReason}</span></div>)}</div>);}

// ===== SCREEN 1 =====
function PriceSlider({min,max,value,onChange}){const[lo,hi]=value;const pct=(v)=>((v-min)/(max-min))*100;return(<div style={{position:'relative',height:24,display:'flex',alignItems:'center'}}><div style={{position:'absolute',left:0,right:0,height:5,borderRadius:5,background:'#E6E8EB'}}/><div style={{position:'absolute',height:5,borderRadius:5,background:'var(--green)',left:`${pct(lo)}%`,right:`${100-pct(hi)}%`}}/><input type="range" min={min} max={max} step={1} value={lo} onChange={e=>onChange([Math.min(+e.target.value,hi-1),hi])} className="gd-range" style={{zIndex:lo>max-2?5:3}}/><input type="range" min={min} max={max} step={1} value={hi} onChange={e=>onChange([lo,Math.max(+e.target.value,lo+1)])} className="gd-range" style={{zIndex:4}}/><style>{`.gd-range{position:absolute;left:0;right:0;width:100%;margin:0;background:none;pointer-events:none;-webkit-appearance:none;appearance:none;height:24px;}.gd-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--green);box-shadow:0 1px 4px rgba(0,0,0,.18);cursor:pointer;pointer-events:auto;}.gd-range::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--green);box-shadow:0 1px 4px rgba(0,0,0,.18);cursor:pointer;pointer-events:auto;}`}</style></div>);}
function FilterSidebar({diet,toggleDiet,price,setPrice,store,setStore}){return(<aside style={{width:268,flex:'0 0 auto',background:'#fff',borderRight:'1px solid var(--line)',padding:'24px 22px',overflowY:'auto'}}><div style={{fontWeight:700,fontSize:13,letterSpacing:'.04em',textTransform:'uppercase',color:'var(--muted)',marginBottom:14}}>Dietary</div><div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:28}}>{DIETARY.map(d=>{const on=diet.includes(d.id);return(<button key={d.id} onClick={()=>toggleDiet(d.id)} style={{display:'flex',alignItems:'center',gap:11,padding:'8px 8px',borderRadius:8,background:on?'var(--green-tint)':'transparent',textAlign:'left',transition:'background .12s'}}><span style={{width:20,height:20,borderRadius:6,flex:'0 0 auto',background:on?'var(--green)':'#fff',border:on?'none':'1.6px solid #cfd2d6',display:'flex',alignItems:'center',justifyContent:'center'}}>{on&&<Ico.check s={12}/>}</span><span style={{flex:1,fontSize:14,fontWeight:on?600:500,color:'var(--dark)'}}>{d.label}</span><span style={{fontSize:12,color:'var(--muted)'}}>{d.count}</span></button>);})}</div><div style={{fontWeight:700,fontSize:13,letterSpacing:'.04em',textTransform:'uppercase',color:'var(--muted)',marginBottom:14}}>Price range</div><PriceSlider min={0} max={15} value={price} onChange={setPrice}/><div style={{display:'flex',justifyContent:'space-between',marginTop:14,marginBottom:28}}><div style={{flex:1,background:'var(--bg)',borderRadius:8,padding:'8px 10px',textAlign:'center',fontWeight:700,fontSize:14}}>${price[0]}</div><div style={{width:18,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--muted)'}}>–</div><div style={{flex:1,background:'var(--bg)',borderRadius:8,padding:'8px 10px',textAlign:'center',fontWeight:700,fontSize:14}}>${price[1]}</div></div><div style={{fontWeight:700,fontSize:13,letterSpacing:'.04em',textTransform:'uppercase',color:'var(--muted)',marginBottom:14}}>Store</div><div style={{display:'flex',flexDirection: function Screen3(){const[qty,setQty]=useState({});const add=(id)=>setQty(q=>({...q,[id]:(q[id]||0)+1}));const sub=(id)=>setQty(q=>({...q,[id]:Math.max(0,(q[id]||0)-1)}));return(<div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg)'}}><DesktopHeader query="vegetarian high-protein lunch" cartCount={6} rightSlot={<button style={{display:'flex',alignItems:'center',gap:8,height:46,padding:'0 18px',borderRadius:'var(--r-pill)',background:'var(--green-tint)',border:'1.5px solid #cce6cc',color:'var(--green-deep)',fontWeight:700,fontSize:13.5}}><Ico.spark s={15} c="var(--green-deep)"/>Assistant</button>}/><div style={{display:'flex',flex:1,minHeight:0}}><main style={{flex:1,overflowY:'auto',padding:'22px 28px 40px'}}><div style={{fontSize:20,fontWeight:700,letterSpacing:'-.02em',marginBottom:4}}>Lunch ideas</div><div style={{color:'var(--muted)',fontSize:13.5,marginBottom:18}}>Curated by your assistant from 5 nearby stores</div><div style={{display:'grid',gridTemplateColumns:'repeat(3, 1fr)',gap:16}}>{SEARCH_PRODUCTS.map(p=>(<ProductCard key={p.id} p={p} qty={qty[p.id]} onAdd={()=>add(p.id)} onSub={()=>sub(p.id)}/>))}</div></main><ChatPanel/></div></div>);}

function MobileStatusBar(){return(<div style={{height:44,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 22px',fontWeight:600,fontSize:14,color:'var(--dark)',flex:'0 0 auto'}}><span>10:27</span><div style={{display:'flex',alignItems:'center',gap:6}}><svg width="17" height="12" viewBox="0 0 17 12" fill="var(--dark)"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity=".35"/></svg><svg width="17" height="12" viewBox="0 0 17 12" fill="none" stroke="var(--dark)" strokeWidth="1.4"><path d="M8.5 3.2c2 0 3.8.8 5 2M2 5.8a9.5 9.5 0 0 1 13 0M5.2 8.6a5 5 0 0 1 6.6 0" strokeLinecap="round"/></svg><svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="21" height="11" rx="3" stroke="var(--dark)" strokeWidth="1.2"/><rect x="2.5" y="2.5" width="14" height="8" rx="1.5" fill="var(--dark)"/><rect x="23" y="4.5" width="2" height="4" rx="1" fill="var(--dark)"/></svg></div></div>);}
function MobilePill({label,active}){return(<button style={{flex:'0 0 auto',display:'inline-flex',alignItems:'center',gap:6,height:34,padding:active?'0 14px 0 9px':'0 14px',borderRadius:'var(--r-pill)',background:active?'var(--green-tint)':'#fff',border:active?'1.5px solid var(--green)':'1.5px solid var(--line)',color:active?'var(--green-deep)':'var(--dark)',fontWeight:600,fontSize:13}}>{active&&<span style={{width:15,height:15,borderRadius:'50%',background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico.check s={10}/></span>}{label}</button>);}
function MobileCard({p,qty,onAdd,onSub}){return(<div style={{position:'relative',background:'#fff',borderRadius:'var(--r-card)',border:'1px solid var(--line)',padding:10,display:'flex',flexDirection:'column'}}><div style={{position:'relative',height:104,borderRadius:8,background:'linear-gradient(160deg,#FAFBF8,#F0F2EE)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:9}}>{p.aiPick&&(<div style={{position:'absolute',top:7,left:7,display:'inline-flex',alignItems:'center',gap:3,background:'var(--amber-bg)',color:'var(--amber-tx)',border:'1px solid var(--amber-line)',fontWeight:700,fontSize:9.5,padding:'2px 6px',borderRadius:24}}><Ico.spark s={9}/>AI pick</div>)}<div style={{position:'absolute',top:6,right:6}}><AddBtn qty={qty} onAdd={onAdd} onSub={onSub} size={30}/></div><span style={{fontSize:46}}>{p.emoji}</span></div><div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:3}}><PriceSplit value={p.price} size={17}/>{p.was&&<span style={{color:'#9a9da3',fontSize:11,textDecoration:'line-through'}}>{money(p.was)}</span>}</div><div style={{fontWeight:600,fontSize:13,lineHeight:1.25,marginBottom:2}}>{p.name}</div><div style={{display:'flex',alignItems:'center',gap:5,marginBottom:8}}><StoreMark store={{color:p.storeColor,initials:p.store[0]}} size={15}/><span style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>{p.store}</span></div><div style={{display:'flex',gap:5,flexWrap:'wrap',marginTop:'auto'}}>{p.tags.slice(0,2).map(t=><Tag key={t} label={t} small/>)}</div></div>);}
function BudgetLineM({label,value}){return(<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:13}}><span style={{color:'#5a5d63'}}>{label}</span><span style={{fontWeight:600,color:'var(--dark)'}}>{value}</span></div>);}
function Screen4(){const[qty,setQty]=useState({p1:1});const add=(id)=>setQty(q=>({...q,[id]:(q[id]||0)+1}));const sub=(id)=>setQty(q=>({...q,[id]:Math.max(0,(q[id]||0)-1)}));const remaining=Math.max(0,BUDGET.freeDeliveryAt-BUDGET.subtotal);const progress=Math.min(100,(BUDGET.subtotal/BUDGET.freeDeliveryAt)*100);return(<div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg)',overflow:'hidden'}}><MobileStatusBar/><div style={{background:'#fff',padding:'4px 16px 12px',flex:'0 0 auto',borderBottom:'1px solid var(--line)'}}><div style={{display:'flex',alignItems:'center',gap:10}}><button style={{padding:4}}><Ico.back s={22}/></button><div style={{flex:1,display:'flex',alignItems:'center',gap:9,height:42,background:'var(--bg)',borderRadius:'var(--r-pill)',padding:'0 14px',border:'1.5px solid var(--line)'}}><Ico.search s={17} c="#6E7178"/><input defaultValue="halal bread under $5" style={{flex:1,border:'none',background:'transparent',outline:'none',fontSize:13.5,fontWeight:500,minWidth:0}}/><Ico.x s={15} c="#9a9da3"/></div><button style={{position:'relative',padding:4}}><Ico.cart s={23}/><span style={{position:'absolute',top:-2,right:-3,minWidth:17,height:17,borderRadius:9,background:'var(--green)',color:'#fff',fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',border:'1.5px solid #fff'}}>6</span></button></div><div className="no-sb" style={{display:'flex',gap:8,overflowX:'auto',marginTop:12,paddingBottom:2}}><MobilePill label="Halal" active/><MobilePill label="Gluten-Free" active/><MobilePill label="Vegan"/><MobilePill label="Organic"/><MobilePill label="Under $5"/><MobilePill label="Kosher"/></div></div><div style={{flex:1,overflowY:'auto',padding:'14px 16px 16px'}}><div style={{fontSize:13.5,fontWeight:600,color:'var(--muted)',marginBottom:12}}>4 results · 5 stores</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>{SEARCH_PRODUCTS.map(p=>(<MobileCard key={p.id} p={p} qty={qty[p.id]} onAdd={()=>add(p.id)} onSub={()=>sub(p.id)}/>))}</div></div><div style={{flex:'0 0 auto',background:'#fff',borderTop:'1px solid var(--line)',boxShadow:'0 -4px 16px rgba(20,30,40,.06)'}}><div style={{padding:'10px 16px 8px'}}><div style={{fontSize:12,fontWeight:600,color:'var(--amber-tx)',marginBottom:6}}>Add <b>{money(remaining)}</b> more for free delivery</div><div style={{height:6,borderRadius:6,background:'#F0F1F2',overflow:'hidden'}}><div style={{height:'100%',width:`${progress}%`,background:'linear-gradient(90deg,#F5B824,#108910)',borderRadius:6}}/></div></div><div style={{padding:'4px 16px 6px',display:'flex',flexDirection:'column',gap:5}}><BudgetLineM label="Subtotal" value={money(BUDGET.subtotal)}/><BudgetLineM label="Delivery fee" value={money(BUDGET.delivery)}/><BudgetLineM label="Est. tip" value={money(BUDGET.tip)}/><BudgetLineM label="Est. tax" value={money(BUDGET.tax)}/></div><div style={{padding:'8px 16px 16px',borderTop:'1px solid var(--line)',marginTop:4}}><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}><span style={{fontSize:13,fontWeight:600,color:'var(--muted)'}}>Estimated total</span><span style={{fontSize:26,fontWeight:700,color:'var(--green)',letterSpacing:'-.02em'}}>{money(BUDGET.total)}</span></div><button style={{width:'100%',height:52,borderRadius:'var(--r-pill)',background:'var(--green)',color:'#fff',fontWeight:700,fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:'0 6px 16px rgba(16,137,16,.3)'}}>Review order <Ico.chev s={19} c="#fff"/></button></div><div style={{display:'flex',justifyContent:'center',paddingBottom:8}}><div style={{width:134,height:5,borderRadius:5,background:'#d8dadd'}}/></div></div></div>);}

// ===== APP SHELL =====
const TABS=[{id:1,label:'Search & Filters',sub:'Desktop · 1440',w:1440,h:900,mobile:false,Comp:Screen1},{id:2,label:'Budget',sub:'Desktop · 1440',w:1440,h:900,mobile:false,Comp:Screen2},{id:3,label:'AI Assistant',sub:'Desktop · 1440',w:1440,h:900,mobile:false,Comp:Screen3},{id:4,label:'Mobile',sub:'iPhone · 375',w:375,h:812,mobile:true,Comp:Screen4}];
function Scaler({w,h,allowUp,children}){const wrapRef=useRef(null);const[scale,setScale]=useState(1);useLayoutEffect(()=>{const el=wrapRef.current;if(!el)return;const fit=()=>{const aw=el.clientWidth;const ah=el.clientHeight;let s=Math.min(aw/w,ah/h);if(!allowUp)s=Math.min(s,1);setScale(s>0?s:1);};fit();const ro=new ResizeObserver(fit);ro.observe(el);window.addEventListener('resize',fit);return()=>{ro.disconnect();window.removeEventListener('resize',fit);};},[w,h,allowUp]);return(<div ref={wrapRef} style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}><div style={{width:w*scale,height:h*scale,flex:'0 0 auto'}}><div style={{width:w,height:h,transform:`scale(${scale})`,transformOrigin:'top left'}}>{children}</div></div></div>);}
function DesktopFrame({children}){return(<div style={{width:'100%',height:'100%',borderRadius:14,overflow:'hidden',background:'#fff',boxShadow:'0 30px 80px rgba(0,0,0,.45)',border:'1px solid rgba(255,255,255,.06)',display:'flex',flexDirection:'column'}}><div style={{height:40,background:'#EDEEF0',borderBottom:'1px solid #e0e1e4',display:'flex',alignItems:'center',padding:'0 16px',gap:8,flex:'0 0 auto'}}><span style={{width:12,height:12,borderRadius:'50%',background:'#FF5F57'}}/><span style={{width:12,height:12,borderRadius:'50%',background:'#FEBC2E'}}/><span style={{width:12,height:12,borderRadius:'50%',background:'#28C840'}}/><div style={{flex:1,maxWidth:420,margin:'0 auto',height:24,background:'#fff',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11.5,color:'#9a9da3',fontWeight:500}}>grocerydiscovery.app/search</div></div><div style={{flex:1,minHeight:0}}>{children}</div></div>);}
function MobileFrame({children}){return(<div style={{width:'100%',height:'100%',borderRadius:52,background:'#0c0c0e',padding:11,boxShadow:'0 30px 80px rgba(0,0,0,.5)'}}><div style={{width:'100%',height:'100%',borderRadius:42,overflow:'hidden',background:'#fff',position:'relative'}}>{children}</div></div>);}
function App(){const[tab,setTab]=useState(1);const active=TABS.find(t=>t.id===tab);const Comp=active.Comp;return(<div style={{display:'flex',flexDirection:'column',height:'100vh',background:'#1e1f23'}}><div style={{flex:'0 0 auto',padding:'14px 24px',display:'flex',alignItems:'center',gap:20,borderBottom:'1px solid rgba(255,255,255,.08)'}}><div style={{display:'flex',alignItems:'center',gap:11}}><div style={{width:30,height:30,borderRadius:8,background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8h18l-1.6 11.2a2 2 0 0 1-2 1.8H6.6a2 2 0 0 1-2-1.8z"/><path d="M8 8a4 4 0 0 1 8 0"/></svg></div><div style={{lineHeight:1.15}}><div style={{color:'#fff',fontWeight:700,fontSize:15,letterSpacing:'-.01em'}}>Grocery Discovery</div><div style={{color:'#8a8d94',fontSize:11.5,fontWeight:500}}>AI grocery prototype · Anel Bazarbayeva</div></div></div><div style={{display:'flex',gap:6,marginLeft:'auto',background:'#2a2b30',padding:5,borderRadius:'var(--r-pill)'}}>{TABS.map(t=>{const on=t.id===tab;return(<button key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:1,padding:'7px 16px',borderRadius:'var(--r-pill)',background:on?'#fff':'transparent',transition:'background .15s',textAlign:'left'}}><span style={{fontSize:13,fontWeight:700,whiteSpace:'nowrap',color:on?'var(--dark)':'#c7cace'}}>{t.label}</span><span style={{fontSize:10,fontWeight:500,whiteSpace:'nowrap',color:on?'var(--muted)':'#7c7f86'}}>{t.sub}</span></button>);})}</div></div><div style={{flex:1,minHeight:0,position:'relative',padding:active.mobile?'28px':'34px 48px'}}><Scaler w={active.w} h={active.h} allowUp={active.mobile}>{active.mobile?<MobileFrame><Comp/></MobileFrame>:<DesktopFrame><Comp/></DesktopFrame>}</Scaler></div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
